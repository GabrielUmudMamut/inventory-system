<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥐 Bakery Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── CSS Custom Properties ── */
        :root {
            --bg:           #1a1025;
            --surface:      #2d1b40;
            --surface-alt:  #3a2352;
            --accent:       #d0bcff;
            --accent-glow:  rgba(208, 188, 255, 0.15);
            --text:         #eaddff;
            --text-muted:   #a89bb8;
            --border:       #4a3163;
            --green:        #78c99d;
            --red:          #f28c8c;
            --shadow:       0 8px 32px rgba(0, 0, 0, 0.45);
            --radius:       16px;
            --transition:   0.35s ease;
        }

        [data-theme="light"] {
            --bg:           #fffaf7;
            --surface:      #ffffff;
            --surface-alt:  #f9f6fc;
            --accent:       #6b21a8;
            --accent-glow:  rgba(107, 33, 168, 0.08);
            --text:         #2d1b40;
            --text-muted:   #665a73;
            --border:       #e8d8f0;
            --green:        #288450;
            --red:          #c03737;
            --shadow:       0 8px 32px rgba(107, 33, 168, 0.08);
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }

        .top-bar h1    { font-size: 2.4rem; }
        .top-bar p     { color: var(--text-muted); margin-top: 4px; }

        .theme-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow);
            transition: background var(--transition), transform 0.2s;
        }
        .theme-btn:hover { background: var(--surface-alt); transform: translateY(-2px); }

        /* ── Section Box ── */
        .section-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 28px;
            box-shadow: var(--shadow);
        }
        .section-box h2 { margin-bottom: 18px; }

        /* ── Insights ── */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }
        .insight-card {
            padding: 18px 20px;
            border-radius: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }
        .insight-card p { margin-top: 6px; font-size: 0.9rem; color: var(--text-muted); }

        /* ── Charts ── */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        .chart-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .chart-box h3 { margin-bottom: 16px; }

        @media (max-width: 700px) {
            .chart-grid { grid-template-columns: 1fr; }
        }

        /* ── Tables ── */
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0 10px 14px;
        }
        td {
            padding: 13px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        tr:last-child td { border-bottom: none; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }
        .profit { color: var(--green); }
        .loss   { color: var(--red); }

        /* ── Daily Cards ── */
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(0,0,0,0.35); }
        .card-label { font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-bottom: 6px; letter-spacing: 0.05em; }
        .card h2   { margin-bottom: 12px; font-size: 1.4rem; }

        /* ── Empty State ── */
        .empty { color: var(--text-muted); font-style: italic; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <div class="top-bar">
        <div>
            <h1>🥐 The Artisan Bakery</h1>
            <p>Financial &amp; Inventory Overview</p>
        </div>
        <button class="theme-btn" id="themeToggle">🌓 Switch Theme</button>
    </div>

    <!-- ── Insights ── -->
    <div class="section-box">
        <h2>✨ Consultant Insights</h2>
        <div id="insights-container" class="insights-grid">
            <p class="empty">Run the Insight tool in Python to generate advice.</p>
        </div>
    </div>

    <!-- ── Charts ── -->
    <div class="chart-grid">
        <div class="chart-box">
            <h3>Production vs. Sales</h3>
            <canvas id="inventoryChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Net Profit per Item ($)</h3>
            <canvas id="profitChart"></canvas>
        </div>
    </div>

    <!-- ── Averages Table ── -->
    <div class="section-box">
        <h2>Global Averages</h2>
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th class="num">Avg Made</th>
                    <th class="num">Avg Sold</th>
                    <th class="num">Avg Profit</th>
                    <th class="num">Waste Loss</th>
                </tr>
            </thead>
            <tbody id="averages-tbody">
                <tr><td colspan="5" class="empty">Awaiting Python data…</td></tr>
            </tbody>
        </table>
    </div>

    <!-- ── Daily Records ── -->
    <h2 style="margin-bottom: 20px;">Past Records</h2>
    <div class="daily-grid" id="dashboard"></div>

    <script>
        // ── Theme Toggle ──────────────────────────────────────────────
        const themeBtn = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';

        if (savedTheme === 'light') {
            document.body.setAttribute('data-theme', 'light');
        }

        themeBtn.addEventListener('click', () => {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            if (isLight) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
            // Reload to re-render Chart.js with the new palette
            location.reload();
        });

        // Resolve CSS variables for Chart.js (must run after theme is applied)
        const isLight = document.body.getAttribute('data-theme') === 'light';
        const palette = {
            accent:      isLight ? '#6b21a8' : '#d0bcff',
            accentAlpha: isLight ? 'rgba(107,33,168,0.2)' : 'rgba(208,188,255,0.2)',
            green:       isLight ? '#288450' : '#78c99d',
            greenAlpha:  'rgba(120,201,157,0.3)',
            gridColor:   isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.07)',
            textMuted:   isLight ? '#665a73' : '#a89bb8',
        };

        Chart.defaults.color = palette.textMuted;
        Chart.defaults.font.family = "'Inter', sans-serif";

        // ── Shared chart option helpers ───────────────────────────────
        function baseScales() {
            return {
                x: { grid: { color: palette.gridColor } },
                y: { beginAtZero: true, grid: { color: palette.gridColor } },
            };
        }

        // ── Load Insights ─────────────────────────────────────────────
        async function loadInsights() {
            try {
                const res = await fetch('data/insight_report.json');
                if (!res.ok) return;
                const data = await res.json();
                const container = document.getElementById('insights-container');
                container.innerHTML = '';

                (data.alerts || []).forEach(alert => {
                    container.innerHTML += `
                        <div class="insight-card">
                            <strong style="color:var(--red)">⚠️ ${escapeHtml(alert.product)}</strong>
                            <p>${escapeHtml(alert.message)}</p>
                        </div>`;
                });

                (data.good_performers || []).forEach(good => {
                    container.innerHTML += `
                        <div class="insight-card">
                            <strong style="color:var(--green)">✨ ${escapeHtml(good.product)}</strong>
                            <p>${escapeHtml(good.message)}</p>
                        </div>`;
                });

                if (container.innerHTML === '') {
                    container.innerHTML = '<p class="empty">No insights generated yet.</p>';
                }
            } catch (_) {}
        }

        // ── Load Averages & Charts ────────────────────────────────────
        async function loadAverages() {
            try {
                const res = await fetch('data/average_report.json');
                if (!res.ok) return;
                const data = await res.json();
                const tbody = document.getElementById('averages-tbody');
                tbody.innerHTML = '';

                const labels = [], made = [], sold = [], profits = [];

                data.averages.forEach(item => {
                    labels.push(item.name);
                    made.push(item.avg_made);
                    sold.push(item.avg_sold);
                    profits.push(item.avg_profit ?? 0);

                    const profit = (item.avg_profit ?? 0).toFixed(2);
                    const loss   = (item.avg_loss   ?? 0).toFixed(2);

                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:500">${escapeHtml(item.name)}</td>
                            <td class="num">${item.avg_made}</td>
                            <td class="num">${item.avg_sold}</td>
                            <td class="num profit">+$${profit}</td>
                            <td class="num loss">-$${loss}</td>
                        </tr>`;
                });

                new Chart(document.getElementById('inventoryChart'), {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: 'Made',
                                data: made,
                                backgroundColor: palette.accentAlpha,
                                borderColor: palette.accent,
                                borderWidth: 1,
                                borderRadius: 4,
                            },
                            {
                                label: 'Sold',
                                data: sold,
                                backgroundColor: palette.greenAlpha,
                                borderColor: palette.green,
                                borderWidth: 1,
                                borderRadius: 4,
                            },
                        ],
                    },
                    options: { scales: baseScales() },
                });

                new Chart(document.getElementById('profitChart'), {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Net Profit ($)',
                            data: profits,
                            backgroundColor: profits.map(v => v >= 0 ? palette.accentAlpha : 'rgba(242,140,140,0.3)'),
                            borderColor:     profits.map(v => v >= 0 ? palette.accent      : '#f28c8c'),
                            borderWidth: 1,
                            borderRadius: 6,
                        }],
                    },
                    options: { scales: baseScales() },
                });

            } catch (_) {}
        }

        // ── Load Daily Grid ───────────────────────────────────────────
        async function loadDailyGrid() {
            try {
                const manifestRes = await fetch('data/manifest.json');
                if (!manifestRes.ok) return;
                const manifest = await manifestRes.json();
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = '';

                // Show most recent days first
                for (const filename of [...manifest.files_available].reverse()) {
                    try {
                        const fileRes = await fetch(`data/${filename}`);
                        const data = await fileRes.json();

                        const rows = data.inventory.map(item => {
                            const profitStr = item.profit !== undefined
                                ? `<span style="color:var(--green); font-size:0.8rem">+$${item.profit.toFixed(2)}</span>`
                                : '';
                            return `
                                <tr>
                                    <td style="text-transform:capitalize">${escapeHtml(item.name)}</td>
                                    <td class="num">${item.sold} / ${item.made}<br>${profitStr}</td>
                                </tr>`;
                        }).join('');

                        dashboard.innerHTML += `
                            <div class="card">
                                <div class="card-label">WEEK ${data.week_number} &nbsp;|&nbsp; DAY ${data.day_number}</div>
                                <h2>Daily Log</h2>
                                <table><tbody>${rows}</tbody></table>
                            </div>`;
                    } catch (_) {}
                }

                if (dashboard.innerHTML === '') {
                    dashboard.innerHTML = '<p class="empty">No daily records found.</p>';
                }
            } catch (_) {}
        }

        // ── Utility: prevent XSS ──────────────────────────────────────
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Boot ──────────────────────────────────────────────────────
        loadInsights();
        loadAverages();
        loadDailyGrid();
    </script>
</body>
</html>
